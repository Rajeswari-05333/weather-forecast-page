<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather Forecast App</title>

  <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="min-h-screen bg-gradient-to-r from-blue-400 to-blue-600 transition-all duration-500">

  <div class="container mx-auto px-4 py-8">

    <div class="flex flex-col md:flex-row justify-between items-center mb-8">
      <h1 class="text-3xl md:text-4xl font-bold text-white mb-4 md:mb-0">
        Weather Forecast
      </h1>

      <div class="flex gap-2">
        <input 
            type="text" 
            placeholder="Enter city..." 
            class="px-4 py-2 rounded-lg focus:outline-none"
            id="cityInput"
        />

        <button 
            class="bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold hover:bg-gray-200 transition"
            id="searchBtn"
            >
            Search
        </button>

        <button 
            class="bg-red-500 text-white px-4 py-2 rounded-lg font-semibold hover:bg-red-600 transition"
            id="resetBtn"
            >
            Reset
        </button>
      </div>
      
      <div id="loading" class="hidden text-center text-white mt-4">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-white mx-auto"></div>
            <p class="mt-2">Fetching weather data...</p>
        </div>

      <p id="errorMessage" class="hidden text-center text-red-200 mt-4 font-semibold"></p>
       </div>

    <div class="bg-white bg-opacity-20 backdrop-blur-md rounded-2xl p-6 text-white shadow-lg mb-8 transition-all duration-500">

      <h2 class="text-2xl font-semibold mb-2" id="cityName">
        Bhubaneswar
      </h2>

      <div class="flex items-center justify-between flex-wrap">

        <div class="flex items-center gap-6">

          <img id="mainWeatherIcon" class="w-20 h-20" />

        <div>
          <p class="text-6xl font-bold" id="temperature">
          32°C
          </p>
            <p class="text-xl mt-2 capitalize" id="condition">
            Sunny
          </p>
        </div>
      </div>

        <div class="mt-4 md:mt-0">
          <p>Humidity: <span id="humidity">60%</span></p>
          <p>Wind: <span id="wind">12 km/h</span></p>
        </div>

      </div>
    </div>

    <h3 class="text-white text-2xl font-semibold mb-4">
      5-Day Forecast
    </h3>

    <div id="forecastContainer" 
     class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-5 gap-4">
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
